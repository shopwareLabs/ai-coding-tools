name: Test Hook Scripts

on:
  push:
    paths:
      - 'plugins/**/hooks/**'
      - 'plugin-tests/**'
      - '.github/workflows/test-hooks.yml'
      - '.github/scripts/setup-bats.sh'
  pull_request:
    paths:
      - 'plugins/**/hooks/**'
      - 'plugin-tests/**'
      - '.github/workflows/test-hooks.yml'
      - '.github/scripts/setup-bats.sh'

jobs:
  test:
    name: BATS Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Setup BATS
        id: setup-bats
        uses: bats-core/bats-action@3.0.1
        with:
          support-install: true
          assert-install: true
          support-path: ${{ github.workspace }}/.bats/bats-support
          assert-path: ${{ github.workspace }}/.bats/bats-assert

      - name: Run all tests
        run: |
          echo "Running BATS tests with timing..."
          bats --timing -r plugin-tests/

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y kcov jq

      - name: Setup BATS
        run: ./.github/scripts/setup-bats.sh

      - name: Run tests with coverage
        run: |
          kcov --include-path=./plugins \
               --exclude-pattern=.bats,plugin-tests \
               coverage/ \
               .bats/bats-core/bin/bats -r plugin-tests/
