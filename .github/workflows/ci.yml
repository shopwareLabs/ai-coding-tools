name: CI

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'plugin-tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.shellcheckrc'
      - '.github/workflows/ci.yml'
      - '.github/scripts/**'
  pull_request:
    paths:
      - 'plugins/**'
      - 'plugin-tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.shellcheckrc'
      - '.github/workflows/ci.yml'
      - '.github/scripts/**'

jobs:
  bash:
    name: Bash Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install ShellCheck
        run: |
          SHELLCHECK_VERSION="v0.11.0"
          ARCH=$(uname -m)  # x86_64 or aarch64 on GitHub runners
          wget -q "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.${ARCH}.tar.xz"
          tar -xJf "shellcheck-${SHELLCHECK_VERSION}.linux.${ARCH}.tar.xz"
          sudo mv "shellcheck-${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/
          shellcheck --version

      - name: ShellCheck
        run: |
          find plugins plugin-tests .github/scripts -type f \
            \( -name '*.sh' -o -name '*.bats' -o -name '*.bash' \) \
            -exec shellcheck --shell=bash --format=gcc {} +

      - name: Setup BATS
        id: setup-bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # 4.0.0
        with:
          support-install: true
          assert-install: true
          support-path: ${{ github.workspace }}/.bats/bats-support
          assert-path: ${{ github.workspace }}/.bats/bats-assert

      - name: BATS
        run: |
          echo "Running BATS tests with timing..."
          bats --timing -r plugin-tests/

  python:
    name: Python Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --locked --group test --group lint

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest plugin-tests/dev-tooling/lsp_proxy/ -v
