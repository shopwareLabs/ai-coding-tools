name: CI

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'plugin-tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
      - '.github/scripts/setup-bats.sh'
  pull_request:
    paths:
      - 'plugins/**'
      - 'plugin-tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
      - '.github/scripts/setup-bats.sh'

jobs:
  bash:
    name: Bash tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Setup BATS
        id: setup-bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # 4.0.0
        with:
          support-install: true
          assert-install: true
          support-path: ${{ github.workspace }}/.bats/bats-support
          assert-path: ${{ github.workspace }}/.bats/bats-assert

      - name: Run all tests
        run: |
          echo "Running BATS tests with timing..."
          bats --timing -r plugin-tests/

  python:
    name: Python Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --locked --group test --group lint

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest plugin-tests/dev-tooling/lsp_proxy/ -v
