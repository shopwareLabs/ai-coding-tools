name: Build Agent Skills

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'agent-skills-export/**'
      - '.github/workflows/build-agent-skills.yml'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'agent-skills-export/**'
      - '.github/workflows/build-agent-skills.yml'
  workflow_dispatch:

jobs:
  discover-skills:
    runs-on: ubuntu-latest
    outputs:
      skills: ${{ steps.find-skills.outputs.skills }}
      has_skills: ${{ steps.find-skills.outputs.has_skills }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1

      - name: Find exportable skills
        id: find-skills
        run: |
          skills_json=$(uv run --project agent-skills-export list-agent-skills plugins/)
          echo "skills=$skills_json" >> "$GITHUB_OUTPUT"
          if [ "$skills_json" = "[]" ]; then
            echo "has_skills=false" >> "$GITHUB_OUTPUT"
            echo "No exportable skills found"
          else
            echo "has_skills=true" >> "$GITHUB_OUTPUT"
            echo "Skills to build: $skills_json"
          fi

  build-skill:
    needs: discover-skills
    if: needs.discover-skills.outputs.has_skills == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.discover-skills.outputs.skills) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1

      - name: Build skill ZIP
        run: uv run --project agent-skills-export --extra validate build-agent-skill "plugins/${{ matrix.skill.path }}" ./dist

      - name: Upload skill ZIP
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ matrix.skill.name }}
          path: dist/*.zip
          if-no-files-found: error

  comment-on-pr:
    needs: [discover-skills, build-skill]
    if: github.event_name == 'pull_request' && needs.discover-skills.outputs.has_skills == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: skills-dist

      - name: Post PR comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const marker = '<!-- agent-skills-build -->';

            // Collect skill ZIPs
            const skills = [];
            const distDir = 'skills-dist';
            if (fs.existsSync(distDir)) {
              for (const entry of fs.readdirSync(distDir)) {
                const entryPath = path.join(distDir, entry);
                if (fs.statSync(entryPath).isDirectory()) {
                  const zips = fs.readdirSync(entryPath).filter(f => f.endsWith('.zip'));
                  for (const zip of zips) {
                    skills.push(zip.replace('.zip', ''));
                  }
                }
              }
            }

            if (skills.length === 0) return;

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '### Agent Skills Export',
              '',
              `Built **${skills.length}** skill package${skills.length === 1 ? '' : 's'}:`,
              '',
              ...skills.map(s => `- \`${s}\``),
              '',
              `[Download artifacts](${runUrl}#artifacts)`,
            ].join('\n');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  create-release:
    needs: [discover-skills, build-skill]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.discover-skills.outputs.has_skills == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: skills-dist

      - name: Prepare release assets
        id: prepare
        run: |
          mkdir -p release-assets
          find skills-dist -name "*.zip" -exec cp {} release-assets/ \;

          cat > release-body.md << 'BODY'
          Portable skill packages following the [Agent Skills](https://agentskills.io) specification.

          Usable in Cursor, Codex, Gemini, and other Agent Skills-compatible tools.

          ## Available Skills
          BODY

          for zip in release-assets/*.zip; do
            skill_name=$(basename "$zip" .zip)
            echo "- **${skill_name}**" >> release-body.md
          done

          cat >> release-body.md << 'BODY'

          ---
          *Auto-built from skills with `.agent-skills` markers.*
          BODY

      - name: Create or update release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: agent-skills-latest
          name: Agent Skills Packages
          body_path: release-body.md
          files: release-assets/*.zip
          make_latest: false
