name: Python Tests
on:
  push:
    paths:
      - 'plugins/dev-tooling/shared/lsp_proxy.py'
      - 'plugin-tests/dev-tooling/lsp_proxy/**'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    paths:
      - 'plugins/dev-tooling/shared/lsp_proxy.py'
      - 'plugin-tests/dev-tooling/lsp_proxy/**'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install
      - run: uv sync --locked --group test
      - run: uv run pytest plugin-tests/dev-tooling/lsp_proxy/ -v
