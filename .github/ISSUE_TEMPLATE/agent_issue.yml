name: "🤖 Agent Quality Issue"
description: "Report issues with specialized subagents not working as expected"
title: "[AGENT] "
labels: ["agent", "quality-issue"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an agent quality issue! This helps us improve specialized subagent behavior and decision-making.

        **Before submitting:**
        - Search existing issues to avoid duplicates
        - Make sure you're using the latest plugin version
        - Have clear examples of the agent's problematic behavior

  - type: checkboxes
    id: preflight
    attributes:
      label: "Preflight Checklist"
      options:
        - label: "I have searched existing issues for duplicates"
          required: true
        - label: "I am using the latest plugin version"
          required: true
        - label: "I can provide clear examples of the agent's behavior"
          required: true

  - type: dropdown
    id: agent
    attributes:
      label: "Which agent?"
      description: "Select the plugin and agent that had issues"
      options:
        - codex-debugger / codex-escalation
        - commit-message-generator / body-validator
        - commit-message-generator / report-generator
        - commit-message-generator / scope-detector
        - commit-message-generator / type-detector
        - test-writing / phpunit-unit-test-generator
        - test-writing / phpunit-unit-test-reviewer
        - test-writing / phpunit-unit-test-reviewer-fixer
        - Other
    validations:
      required: true

  - type: textarea
    id: agent-task
    attributes:
      label: "Task Given to Agent"
      description: "What task was the agent supposed to accomplish? What triggered the agent?"
      placeholder: |
        "After 3 failed debugging attempts, codex-escalation agent was invoked"
        "type-detector agent was called to determine commit type from diff"
    validations:
      required: true

  - type: textarea
    id: context-provided
    attributes:
      label: "Context Provided to Agent"
      description: "What information/context was available to the agent?"
      placeholder: |
        - Error messages from previous attempts
        - Code changes in the diff
        - Git history
        - File contents
      render: code

  - type: textarea
    id: agent-reasoning
    attributes:
      label: "Agent's Reasoning/Decision Steps"
      description: "What did the agent do? Show its analysis, reasoning, or decision-making process"
      placeholder: |
        Show the agent's output including:
        - Analysis steps
        - Decision points
        - Reasoning provided
        - Actions taken
      render: markdown
    validations:
      required: true

  - type: textarea
    id: agent-output
    attributes:
      label: "Agent's Final Output/Recommendation"
      description: "What was the agent's final result or recommendation?"
      placeholder: |
        Show what the agent ultimately produced or recommended
      render: code
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "Expected Agent Behavior"
      description: "What should the agent have done?"
      placeholder: |
        Describe the correct decision-making, analysis, or output the agent should have produced
    validations:
      required: true

  - type: textarea
    id: why-problematic
    attributes:
      label: "Why This Is Problematic"
      description: "Explain specifically what's wrong with the agent's behavior"
      placeholder: |
        - Agent made wrong decision about escalation
        - Agent missed critical context from error messages
        - Agent's analysis was incomplete
        - Agent got stuck in reasoning loop
        - Agent recommended wrong approach
        - Agent escalated too early/late
    validations:
      required: true

  - type: dropdown
    id: issue-category
    attributes:
      label: "Issue Category"
      description: "What type of problem is this?"
      options:
        - Wrong decision/recommendation
        - Incomplete analysis
        - Missed critical context
        - Stuck in loop/circular reasoning
        - Incorrect escalation (too early/late/wrong target)
        - Poor reasoning quality
        - Wrong confidence assessment
        - Performance issue (too slow)
        - Should have been invoked but wasn't
        - Invoked incorrectly
        - Other
    validations:
      required: true

  - type: textarea
    id: what-agent-missed
    attributes:
      label: "What the Agent Should Have Considered"
      description: "What context, patterns, or information should the agent have used but didn't?"
      placeholder: |
        - Specific error patterns in logs
        - File relationships
        - Previous failed attempts
        - Breaking change indicators
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: "Steps to Reproduce"
      description: "Provide step-by-step instructions to reproduce the issue"
      placeholder: |
        1. Set up scenario with [specific conditions]
        2. Trigger agent via [command/situation]
        3. Agent performs [incorrect behavior]
        4. Expected agent to [correct behavior]
    validations:
      required: true

  - type: textarea
    id: sample-code
    attributes:
      label: "Sample Code/Files"
      description: "If applicable, paste code or files that the agent analyzed"
      placeholder: |
        // Code that the agent should have analyzed correctly
      render: code

  - type: dropdown
    id: reproducibility
    attributes:
      label: "Reproducibility"
      description: "How consistently does this issue occur?"
      options:
        - Always (100% of the time)
        - Usually (>75%)
        - Sometimes (25-75%)
        - Rarely (<25%)
        - Once
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: "Impact Level"
      description: "How severely does this affect your workflow?"
      options:
        - Critical (agent completely unreliable)
        - High (major functionality broken)
        - Medium (workaround exists)
        - Low (minor inconvenience)
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: "Usage Frequency"
      description: "How often does this agent run in your workflow?"
      options:
        - Daily
        - Weekly
        - Occasionally
        - First time using
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: "Plugin Version"
      description: "Run `/plugin list` and paste the version shown for this plugin"
      placeholder: "e.g., codex-debugger@1.0.0"
    validations:
      required: true

  - type: input
    id: claude-version
    attributes:
      label: "Claude Code Version"
      description: "Run `claude --version` and paste the output"
      placeholder: "e.g., 0.1.23"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: "Operating System"
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Linux (Other)
        - Windows (WSL2)
        - Other
    validations:
      required: true

  - type: dropdown
    id: project-type
    attributes:
      label: "Project Type"
      description: "What type of project were you working on? (optional)"
      options:
        - PHP/Shopware
        - JavaScript/TypeScript
        - Python
        - Java
        - Go
        - Rust
        - Multiple languages
        - Other

  - type: textarea
    id: workaround
    attributes:
      label: "Workaround"
      description: "Have you found any temporary workarounds?"
      placeholder: |
        Describe any manual steps you take to work around this issue

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: "Any other relevant information, patterns noticed, related issues, or configuration details"
      placeholder: |
        - Link to related issues
        - Patterns (e.g., "only fails with large diffs")
        - Agent configuration settings
        - Full conversation transcript
