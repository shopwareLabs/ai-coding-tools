name: "🎯 Skill Quality Issue"
description: "Report issues with auto-invoked skills not working as expected"
title: "[SKILL] "
labels: ["skill", "quality-issue"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a skill quality issue! This helps us improve automatic skill invocation and analysis.

        **Before submitting:**
        - Search existing issues to avoid duplicates
        - Make sure you're using the latest plugin version
        - Have clear examples of the problematic behavior

  - type: checkboxes
    id: preflight
    attributes:
      label: "Preflight Checklist"
      options:
        - label: "I have searched existing issues for duplicates"
          required: true
        - label: "I am using the latest plugin version"
          required: true
        - label: "I can provide clear examples showing the problem"
          required: true

  - type: dropdown
    id: skill
    attributes:
      label: "Which skill?"
      description: "Select the plugin and skill that had issues"
      options:
        - adr-writing / adr-creating
        - chunkhound-integration / code-research-routing
        - comment-review / comment-reviewing
        - commit-message-generator / commit-message-generating
        - content-discipline / content-disciplining
        - test-writing / phpunit-unit-test-generation
        - test-writing / phpunit-unit-test-reviewing
        - test-writing / phpunit-unit-test-writing
        - Other
    validations:
      required: true

  - type: textarea
    id: user-request
    attributes:
      label: "Your Request to Claude"
      description: "What did you ask Claude to do that should have triggered (or incorrectly triggered) this skill?"
      placeholder: |
        "Review the comments in src/Services/ and improve them"
        "Generate a commit message for my staged changes"
        "Check if the commit message follows conventions"
    validations:
      required: true

  - type: dropdown
    id: invocation-status
    attributes:
      label: "Skill Invocation Status"
      description: "Was the skill invoked when it should/shouldn't have been?"
      options:
        - Skill was invoked (but produced wrong results)
        - Skill should have been invoked but wasn't
        - Skill was invoked but shouldn't have been
        - Unsure if skill was invoked
    validations:
      required: true

  - type: textarea
    id: skill-output
    attributes:
      label: "Skill's Analysis/Output"
      description: "What did the skill produce? Paste or describe the skill's response"
      placeholder: |
        Show what the skill analyzed, categorized, or generated
      render: code
    validations:
      required: true

  - type: textarea
    id: expected-output
    attributes:
      label: "Expected Analysis/Output"
      description: "What should the skill have produced?"
      placeholder: |
        Describe what correct analysis or output would look like
    validations:
      required: true

  - type: textarea
    id: why-wrong
    attributes:
      label: "Why the Result Is Wrong"
      description: "Explain specifically what's incorrect about the skill's analysis or output"
      placeholder: |
        - Categorized obvious comment as VAGUE instead of OBVIOUS
        - Detected wrong commit type (feat instead of fix)
        - Missed redundant comments that just restate code
        - Generated incorrect scope from file paths
        - Failed to detect breaking changes
    validations:
      required: true

  - type: dropdown
    id: issue-category
    attributes:
      label: "Issue Category"
      description: "What type of problem is this?"
      options:
        - Incorrect analysis/categorization
        - False positive (flagged when shouldn't)
        - False negative (missed what it should catch)
        - Wrong detection logic
        - Inconsistent results (sometimes right, sometimes wrong)
        - Performance issue (too slow)
        - Should have been invoked but wasn't
        - Invoked incorrectly
        - Other
    validations:
      required: true

  - type: textarea
    id: sample-code
    attributes:
      label: "Sample Code/Files"
      description: "Paste minimal code that demonstrates the issue"
      placeholder: |
        // Example code that the skill analyzed incorrectly
        // or code that should have triggered the skill
      render: code
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: "Steps to Reproduce"
      description: "Provide step-by-step instructions to reproduce the issue"
      placeholder: |
        1. Create a file with [specific code pattern]
        2. Ask Claude to [specific request]
        3. Skill produces [incorrect result]
        4. Expected [correct result]
    validations:
      required: true

  - type: dropdown
    id: reproducibility
    attributes:
      label: "Reproducibility"
      description: "How consistently does this issue occur?"
      options:
        - Always (100% of the time)
        - Usually (>75%)
        - Sometimes (25-75%)
        - Rarely (<25%)
        - Once
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: "Impact Level"
      description: "How severely does this affect your workflow?"
      options:
        - Critical (skill completely unreliable)
        - High (major functionality broken)
        - Medium (workaround exists)
        - Low (minor inconvenience)
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: "Usage Frequency"
      description: "How often do you use this skill?"
      options:
        - Daily
        - Weekly
        - Occasionally
        - First time using
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: "Plugin Version"
      description: "Run `/plugin list` and paste the version shown for this plugin"
      placeholder: "e.g., comment-review@1.2.0"
    validations:
      required: true

  - type: input
    id: claude-version
    attributes:
      label: "Claude Code Version"
      description: "Run `claude --version` and paste the output"
      placeholder: "e.g., 0.1.23"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: "Operating System"
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Linux (Other)
        - Windows (WSL2)
        - Other
    validations:
      required: true

  - type: dropdown
    id: project-type
    attributes:
      label: "Project Type"
      description: "What type of project were you working on? (optional)"
      options:
        - PHP/Shopware
        - JavaScript/TypeScript
        - Python
        - Java
        - Go
        - Rust
        - Multiple languages
        - Other

  - type: textarea
    id: workaround
    attributes:
      label: "Workaround"
      description: "Have you found any temporary workarounds?"
      placeholder: |
        Describe any manual steps you take to work around this issue

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: "Any other relevant information, patterns noticed, related issues, or configuration details"
      placeholder: |
        - Link to related issues
        - Patterns (e.g., "only fails with nested functions")
        - Custom configuration files
        - Claude's full response showing skill invocation
