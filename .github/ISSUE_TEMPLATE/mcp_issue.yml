name: "🔌 MCP Server Issue"
description: "Report issues with MCP servers not working as expected"
title: "[MCP] "
labels: ["mcp", "quality-issue"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an MCP server issue! This helps us improve server functionality, tool availability, and configuration.

        **Before submitting:**
        - Search existing issues to avoid duplicates
        - Make sure you're using the latest plugin version
        - Confirm you restarted Claude Code after installing the MCP plugin
        - Check that dependencies (jq, Node.js, etc.) are installed

  - type: checkboxes
    id: preflight
    attributes:
      label: "Preflight Checklist"
      options:
        - label: "I have searched existing issues for duplicates"
          required: true
        - label: "I am using the latest plugin version"
          required: true
        - label: "I restarted Claude Code after installing/updating the plugin"
          required: true
        - label: "I have verified dependencies are installed (jq, Node.js, etc.)"
          required: true

  - type: dropdown
    id: plugin
    attributes:
      label: "Which plugin?"
      description: "Select the plugin containing the MCP server"
      options:
        - codex-debugger
        - dev-tooling
        - Other
    validations:
      required: true

  - type: dropdown
    id: mcp-server
    attributes:
      label: "Which MCP server?"
      description: "Select the specific MCP server that had issues"
      options:
        - codex-debugger / codex
        - dev-tooling / js-admin-tooling
        - dev-tooling / js-storefront-tooling
        - dev-tooling / php-tooling
        - Other
    validations:
      required: true

  - type: dropdown
    id: tool-affected
    attributes:
      label: "Which MCP tool?"
      description: "Which specific tool from the MCP server had issues?"
      options:
        - codex / codex
        - codex / codex-reply
        - php-tooling / phpstan_analyze
        - php-tooling / ecs_check
        - php-tooling / ecs_fix
        - php-tooling / phpunit_run
        - php-tooling / console_run
        - php-tooling / console_list
        - js-admin-tooling / eslint_check
        - js-admin-tooling / eslint_fix
        - js-admin-tooling / stylelint_check
        - js-admin-tooling / stylelint_fix
        - js-admin-tooling / prettier_check
        - js-admin-tooling / prettier_fix
        - js-admin-tooling / jest_run
        - js-admin-tooling / tsc_check
        - js-admin-tooling / lint_all
        - js-admin-tooling / lint_twig
        - js-admin-tooling / unit_setup
        - js-admin-tooling / vite_build
        - js-storefront-tooling / eslint_check
        - js-storefront-tooling / eslint_fix
        - js-storefront-tooling / stylelint_check
        - js-storefront-tooling / stylelint_fix
        - js-storefront-tooling / jest_run
        - js-storefront-tooling / webpack_build
        - Server not loading (no tools available)
        - Other
    validations:
      required: true

  - type: textarea
    id: mcp-config
    attributes:
      label: "MCP Configuration"
      description: "Paste relevant configuration files (.mcp.json, .mcp-php-tooling.json, etc.)"
      placeholder: |
        {
          "mcpServers": {
            "php-tooling": {
              "command": "/path/to/server.sh"
            }
          }
        }
      render: json
    validations:
      required: true

  - type: textarea
    id: tool-config
    attributes:
      label: "Tool-Specific Configuration"
      description: "If applicable, paste the tool configuration file (.mcp-php-tooling.json, etc.)"
      placeholder: |
        {
          "environment": "native",
          "phpstan_config": "phpstan.neon"
        }
      render: json

  - type: dropdown
    id: issue-category
    attributes:
      label: "Issue Category"
      description: "What type of problem is this?"
      options:
        - Server not starting/loading
        - Tool not available in Claude Code
        - Tool execution failed
        - Tool returned incorrect results
        - Configuration not recognized
        - Connection timeout
        - Permission denied
        - Missing dependencies
        - Environment detection failed (Docker/Vagrant/DDEV)
        - Config discovery failed
        - Performance issue (too slow)
        - Other
    validations:
      required: true

  - type: textarea
    id: tool-input
    attributes:
      label: "Tool Input/Parameters"
      description: "What parameters were passed to the MCP tool?"
      placeholder: |
        {
          "paths": ["src/"],
          "level": 8,
          "config": "phpstan.neon"
        }
      render: json
    validations:
      required: true

  - type: textarea
    id: actual-output
    attributes:
      label: "Actual Output/Error"
      description: "What did the MCP tool return? Include error messages, unexpected results, etc."
      placeholder: |
        Show the tool's output including:
        - Error messages
        - Stack traces
        - Unexpected results
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "Expected Behavior"
      description: "What should the MCP tool have done?"
      placeholder: |
        Describe the correct behavior you expected:
        - Should have returned PHPStan analysis results
        - Should have fixed code style issues
        - Should have run tests successfully
    validations:
      required: true

  - type: textarea
    id: why-problematic
    attributes:
      label: "Why This Is Problematic"
      description: "Explain specifically what's wrong with the behavior"
      placeholder: |
        - Tool returned error but command works manually
        - Analysis results are incomplete
        - Wrong files were processed
        - Environment was not detected correctly
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: "Steps to Reproduce"
      description: "Provide step-by-step instructions to reproduce the issue"
      placeholder: |
        1. Install plugin with `/plugin install dev-tooling@shopware-plugins`
        2. Create config file `.mcp-php-tooling.json` with [settings]
        3. Restart Claude Code
        4. Ask Claude to run PHPStan analysis
        5. Observe [incorrect behavior]
    validations:
      required: true

  - type: textarea
    id: manual-test
    attributes:
      label: "Manual Command Test"
      description: "Does the underlying command work when run manually in terminal?"
      placeholder: |
        # Manual command test
        vendor/bin/phpstan analyze src/ --level 8
        # Output: [paste results]

        # Did it work? Yes/No
      render: bash

  - type: textarea
    id: server-logs
    attributes:
      label: "Server Logs/Debug Output"
      description: "Paste any MCP server logs or debug output"
      placeholder: |
        Check MCP logs in Claude Code:
        - Developer Tools (if available)
        - stderr output from server
        - Any error messages
      render: shell

  - type: dropdown
    id: environment
    attributes:
      label: "Execution Environment"
      description: "What environment does the tool run in?"
      options:
        - Native (local installation)
        - Docker
        - Vagrant
        - DDEV
        - WSL
        - Unknown
    validations:
      required: true

  - type: textarea
    id: config-discovery
    attributes:
      label: "Config Discovery Locations Checked"
      description: "For dev-tooling: which config locations were searched?"
      placeholder: |
        - .claude/.mcp-php-tooling.json
        - .cursor/.mcp-php-tooling.json
        - .mcp-php-tooling.json
        - etc.

  - type: dropdown
    id: reproducibility
    attributes:
      label: "Reproducibility"
      description: "How consistently does this issue occur?"
      options:
        - Always (100% of the time)
        - Usually (>75%)
        - Sometimes (25-75%)
        - Rarely (<25%)
        - Once
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: "Impact Level"
      description: "How severely does this affect your workflow?"
      options:
        - Critical (MCP server completely unusable)
        - High (major functionality broken)
        - Medium (workaround exists)
        - Low (minor inconvenience)
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: "Usage Frequency"
      description: "How often do you use this MCP tool?"
      options:
        - Daily
        - Weekly
        - Occasionally
        - First time using
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: "Plugin Version"
      description: "Run `/plugin list` and paste the version shown for this plugin"
      placeholder: "e.g., dev-tooling@2.0.0"
    validations:
      required: true

  - type: input
    id: claude-version
    attributes:
      label: "Claude Code Version"
      description: "Run `claude --version` and paste the output"
      placeholder: "e.g., 0.1.23"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: "Operating System"
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Linux (Other)
        - Windows (WSL2)
        - Other
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: "Dependency Versions"
      description: "Version information for relevant dependencies"
      placeholder: |
        jq --version          # jq-1.7.1
        node --version        # v20.10.0
        php --version         # PHP 8.2.0
        composer --version    # Composer 2.6.5

        # For Docker/DDEV:
        docker --version
        ddev --version
      render: bash
    validations:
      required: true

  - type: dropdown
    id: project-type
    attributes:
      label: "Project Type"
      description: "What type of project were you working on?"
      options:
        - PHP/Shopware
        - JavaScript/TypeScript
        - Mixed (PHP + JS)
        - Other
    validations:
      required: true

  - type: textarea
    id: workaround
    attributes:
      label: "Workaround"
      description: "Have you found any temporary workarounds?"
      placeholder: |
        Describe any manual steps you take to work around this issue:
        - Run command directly in terminal
        - Modified config to...
        - Used different environment

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: "Any other relevant information, related issues, or configuration details"
      placeholder: |
        - Link to related issues
        - Screenshots showing the problem
        - Full conversation transcript
        - Special project structure notes
