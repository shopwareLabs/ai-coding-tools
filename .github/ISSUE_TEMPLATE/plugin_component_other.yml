name: "⚙️ Plugin Component Issue (Other)"
description: "Report issues with plugin configuration or other components not covered by specific templates"
title: "[COMPONENT] "
labels: ["component", "quality-issue"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a plugin component issue! This helps us improve plugin functionality.

        **Note:** For hooks, use the [Hook Quality Issue](https://github.com/shopwareLabs/claude-code-plugins/issues/new?template=hook_issue.yml) template. For MCP servers, use the [MCP Server Issue](https://github.com/shopwareLabs/claude-code-plugins/issues/new?template=mcp_issue.yml) template.

        **Before submitting:**
        - Search existing issues to avoid duplicates
        - Make sure you're using the latest plugin version
        - Have clear examples of the problematic behavior

  - type: checkboxes
    id: preflight
    attributes:
      label: "Preflight Checklist"
      options:
        - label: "I have searched existing issues for duplicates"
          required: true
        - label: "I am using the latest plugin version"
          required: true
        - label: "I can provide clear examples showing the problem"
          required: true

  - type: dropdown
    id: plugin
    attributes:
      label: "Which plugin?"
      description: "Select the plugin containing the component"
      options:
        - chunkhound-integration
        - codex-debugger
        - comment-review
        - commit-message-generator
        - content-discipline
        - dev-tooling
        - test-writing
        - Other
    validations:
      required: true

  - type: dropdown
    id: component-type
    attributes:
      label: "Component Type"
      description: "What type of plugin component is this issue about?"
      options:
        - Plugin Configuration (plugin.json, marketplace.json)
        - File Structure Issue
        - Installation/Setup Issue
        - Documentation Issue
        - Other
    validations:
      required: true

  - type: input
    id: component-name
    attributes:
      label: "Component Name/Identifier"
      description: "What is the name or identifier of the component?"
      placeholder: "e.g., plugin.json, SKILL.md, commands/command-name.md"
    validations:
      required: true

  - type: textarea
    id: component-config
    attributes:
      label: "Component Configuration"
      description: "Paste relevant configuration files (plugin.json, SKILL.md frontmatter, etc.)"
      placeholder: |
        {
          "name": "plugin-name",
          "version": "1.0.0",
          ...
        }
      render: yaml

  - type: textarea
    id: actual-behavior
    attributes:
      label: "Actual Behavior"
      description: "What actually happened?"
      placeholder: |
        Describe what happened:
        - Installation error message
        - Plugin not appearing in list
        - Configuration not being recognized
        - Missing or incorrect behavior
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "Expected Behavior"
      description: "What should the component have done?"
      placeholder: |
        Describe the correct behavior you expected
    validations:
      required: true

  - type: textarea
    id: why-problematic
    attributes:
      label: "Why This Is Problematic"
      description: "Explain specifically what's wrong and why it doesn't meet expectations"
      placeholder: |
        - Plugin installation failed
        - Configuration not recognized
        - Component not working as documented
        - Unexpected errors during setup
        - Structure doesn't match expected format
    validations:
      required: true

  - type: dropdown
    id: issue-category
    attributes:
      label: "Issue Category"
      description: "What type of problem is this?"
      options:
        - Installation failed
        - Configuration not working
        - Plugin not loading
        - Missing files/components
        - Version mismatch
        - Documentation unclear
        - Marketplace issue
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: "Steps to Reproduce"
      description: "Provide step-by-step instructions to reproduce the issue"
      placeholder: |
        1. Run `/plugin install [plugin-name]@shopware-plugins`
        2. Restart Claude Code (if required)
        3. Observe [error/unexpected behavior]
        4. Expected [correct behavior]
    validations:
      required: true

  - type: textarea
    id: logs-output
    attributes:
      label: "Logs/Error Output"
      description: "Paste any relevant logs, error messages, or diagnostic output"
      placeholder: |
        Show any error messages, stack traces, or diagnostic output
      render: shell

  - type: dropdown
    id: reproducibility
    attributes:
      label: "Reproducibility"
      description: "How consistently does this issue occur?"
      options:
        - Always (100% of the time)
        - Usually (>75%)
        - Sometimes (25-75%)
        - Rarely (<25%)
        - Once
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: "Impact Level"
      description: "How severely does this affect your workflow?"
      options:
        - Critical (component completely unusable)
        - High (major functionality broken)
        - Medium (workaround exists)
        - Low (minor inconvenience)
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: "Usage Frequency"
      description: "How often should this component work in your workflow?"
      options:
        - Daily
        - Weekly
        - Occasionally
        - First time using
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: "Plugin Version"
      description: "Run `/plugin list` and paste the version shown for this plugin"
      placeholder: "e.g., codex-debugger@1.0.0"
    validations:
      required: true

  - type: input
    id: claude-version
    attributes:
      label: "Claude Code Version"
      description: "Run `claude --version` and paste the output"
      placeholder: "e.g., 0.1.23"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: "Operating System"
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Linux (Other)
        - Windows (WSL2)
        - Other
    validations:
      required: true

  - type: dropdown
    id: project-type
    attributes:
      label: "Project Type"
      description: "What type of project were you working on? (optional)"
      options:
        - PHP/Shopware
        - JavaScript/TypeScript
        - Python
        - Java
        - Go
        - Rust
        - Multiple languages
        - Other

  - type: textarea
    id: system-info
    attributes:
      label: "Additional System Information"
      description: "Any relevant system or environment information"
      placeholder: |
        /plugin list output
        Plugin cache location
        Other relevant system info

  - type: textarea
    id: workaround
    attributes:
      label: "Workaround"
      description: "Have you found any temporary workarounds?"
      placeholder: |
        Describe any manual steps you take to work around this issue

  - type: textarea
    id: additional-context
    attributes:
      label: "Additional Context"
      description: "Any other relevant information, screenshots, related issues, or documentation links"
      placeholder: |
        - Link to related issues
        - Screenshots showing the problem
        - Relevant documentation
        - Environment-specific details
